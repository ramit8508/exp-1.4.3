services:
  # Redis Ticket Booking System
  - type: web
    name: ticket-booking-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_HOST
        sync: false
        # Set this manually in Render dashboard with your Upstash/Redis Cloud endpoint
      - key: REDIS_PORT
        sync: false
        # Set this manually in Render dashboard (usually 6379)
      - key: REDIS_PASSWORD
        sync: false
        # Set this manually in Render dashboard with your Redis password
      - key: REDIS_DB
        value: 0
      - key: TOTAL_SEATS
        value: 50
      - key: LOCK_TIMEOUT
        value: 5000
      - key: PROCESSING_MIN_DELAY
        value: 100
      - key: PROCESSING_MAX_DELAY
        value: 300
      - key: CORS_ORIGIN
        value: "*"
